<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект вики</title>

    <style>
        body {
        font-family: Arial;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        }
        button {
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
        }
        #article {
        margin-top: 30px;
        line-height: 1.6;
        }
        h1 {
        margin-bottom: 10px;
        }

    </style>
</head>
<body>

    <button id="randomBtn">
    Случайная статья (как на вики)
    </button>

    <div id="article">

    </div>

    <script>

        const button = document.getElementById('randomBtn');
        const articleDiv = document.getElementById('article');

        button.addEventListener('click', async () => {

            articleDiv.innerHTML = 'Загрузка...';

            try {
                const response = await fetch(
                'https://ru.wikipedia.org/api/rest_v1/page/random/summary'
                );

                const data = await response.json();

                articleDiv.innerHTML = `
                    <h1>${data.title}</h1>
                    <p>${data.extract}</p>
                `;

            } catch (error) {
                console.error(error);
            }

        });

    </script>

</body>
</html>
