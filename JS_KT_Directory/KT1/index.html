<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табличк</title>
</head>
<body>

<script>
const numbers = [];
for (let i = 0; i < 30; i++) {
numbers.push(Math.floor(Math.random() * 100))
}
const body = document.querySelector('body')
const table = document.createElement('table')
let counter = 0
for (let r = 0; r < 5; r++) {
const tr = document.createElement('tr')
for (let c = 0; c < 6; c++) {
const td = document.createElement('td')
const value = numbers[counter] 
td.textContent = value; 
td.style.border = '1px black'
td.style.padding = '10px'
if (value >= 50) {
    td.style.backgroundColor = 'orange'
}
tr.appendChild(td)
counter++
}
table.appendChild(tr)
}
body.appendChild(table)

function foo() {
const table = document.querySelector('table')
if (!table) return;
    const randomNumber = Math.floor(Math.random() * 100)
let lastRow = table.rows[table.rows.length - 1]
if (!lastRow || lastRow.cells.length >= 6) {
    lastRow = table.insertRow();
}
const newCell = lastRow.insertCell();
newCell.textContent = randomNumber;
newCell.style.border = '1px black';
newCell.style.padding = '10px';
if (randomNumber >= 50) {
    newCell.style.backgroundColor = 'orange';
}
}
</script>
<button onclick="foo()">Добавить число</button>

</body>
</html>
